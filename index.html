
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilenameToExcelUI - Data Manage</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --theme-color: #6366f1;
            --glass: rgba(255, 255, 255, 0.08);
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a; height: 100vh; overflow: hidden; padding: 15px;
            display: flex; justify-content: center; align-items: center;
            color: #fff; transition: background 0.8s ease;
        }

        .blob-bg {
            position: absolute; width: 700px; height: 700px;
            background: var(--theme-color); filter: blur(120px);
            border-radius: 50%; z-index: -1; opacity: 0.4;
            transition: all 1s ease; animation: move 15s infinite alternate;
        }
        @keyframes move { from { transform: translate(-20%, -20%) scale(1); } to { transform: translate(20%, 20%) scale(1.3); } }

        .app-container { 
            width: 100%; max-width: 1500px; height: 95vh; 
            background: var(--glass); backdrop-filter: blur(30px);
            border-radius: 35px; display: flex; flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.15); overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5); position: relative;
        }

        /* Drag Overlay */
        #dropZone {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(99, 102, 241, 0.3); z-index: 9999;
            display: none; justify-content: center; align-items: center;
            border: 5px dashed white; border-radius: 35px; backdrop-filter: blur(10px);
            pointer-events: none;
        }
        #dropZone h1 { font-size: 40px; text-transform: uppercase; letter-spacing: 2px; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 35px; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .brand { font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: white; }
        .session-box input { 
            padding: 12px 20px; border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; 
            width: 300px; font-size: 14px; outline: none; background: rgba(255,255,255,0.15); color: white; font-weight: 700;
        }

        .toolbar { display: flex; gap: 12px; padding: 15px 35px; background: rgba(0,0,0,0.15); align-items: center; flex-wrap: wrap; }
        
        .btn { 
            padding: 10px 22px; border: none; border-radius: 50px; cursor: pointer; 
            font-weight: 700; color: white; font-size: 12px; display: flex; align-items: center; gap: 8px;
            transition: 0.3s; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
        }
        .btn:hover { transform: translateY(-2px); background: var(--theme-color); }

        .search-input { flex-grow: 1; padding: 12px 25px; border-radius: 50px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; font-weight: 600; }

        /* Separator Panel */
        #auditPanel { padding: 10px 35px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .symbol-tags { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .tag-label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .sep-chip { padding: 6px 16px; border-radius: 10px; background: rgba(255,255,255,0.1); cursor: pointer; font-weight: 800; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); font-size: 12px;}
        .sep-chip.active { background: white; color: black; transform: scale(1.05); }

        .table-area { flex-grow: 1; margin: 15px 25px; border-radius: 25px; background: rgba(255,255,255,0.98); overflow: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; color: #1e293b; }
        thead th { position: sticky; top: 0; padding: 18px 20px; text-align: left; font-size: 11px; font-weight: 800; background: var(--theme-color); color: white; z-index: 10; }
        td { padding: 12px 20px; border-bottom: 1px solid #eef2f6; font-size: 13px; font-weight: 600; color: #334155; vertical-align: middle; }

        /* Icons & Actions */
        .th-content { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .th-actions { display: flex; align-items: center; gap: 18px; margin-left: 10px; }
        .filter-trigger { cursor: pointer; font-size: 20px; opacity: 0.8; transition: 0.2s; padding: 5px; }
        .filter-trigger:hover { transform: scale(1.2); opacity: 1; }
        .col-del { background: none; border: none; color: white; cursor: pointer; font-size: 24px; opacity: 0.5; transition: 0.2s; display: flex; align-items: center; }
        .col-del:hover { opacity: 1; transform: scale(1.2); }

        /* Confirmation Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 9000; backdrop-filter: blur(8px);
        }
        .modal-card { background: white; border-radius: 25px; padding: 35px; width: 400px; text-align: center; color: #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        .m-btn { padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; transition: 0.2s; flex: 1; }

        /* Filter Menu */
        .filter-menu {
            position: fixed; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none; flex-direction: column; z-index: 2000; overflow: hidden; border: 1px solid #e2e8f0; min-width: 200px;
        }
        .filter-option { padding: 14px 18px; font-size: 13px; font-weight: 700; color: #1e293b; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .filter-option:hover { background: #f1f5f9; color: var(--theme-color); }

        /* Popup Styles */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .popup-card { background: white; border-radius: 24px; display: flex; max-width: 1000px; width: 95%; max-height: 85vh; overflow: hidden; }
        .popup-img-container { flex: 1.2; background: #000; display: flex; align-items: center; justify-content: center; }
        .popup-img-container img { max-width: 100%; max-height: 85vh; object-fit: contain; }
        .popup-info { flex: 0.8; padding: 30px; overflow-y: auto; color: #1e293b; background: #ffffff; border-left: 1px solid #eee; }
        .info-row { margin-bottom: 12px; background: #f8fafc; padding: 10px 15px; border-radius: 12px; border-left: 4px solid var(--theme-color); }
        .info-label { display: block; font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: 800; }
        .info-val { font-size: 14px; font-weight: 700; color: #0f172a; }

        .history-list { display: flex; gap: 20px; padding: 25px 35px; background: rgba(0,0,0,0.4); overflow-x: auto; min-height: 160px; }
        .history-item { min-width: 240px; max-width: 240px; padding: 20px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.2); position: relative; cursor:pointer;}
        .preview-col { background: #fff1f2 !important; color: #e11d48; font-weight: 800; }
        .img-thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 2px solid #e2e8f0; }
    </style>
</head>
<body onclick="closeAllMenus()">

<div class="blob-bg" id="mainBlob"></div>

<!-- Drag Overlay -->
<div id="dropZone"><h1>🚀 Drop to Upload Folder</h1></div>

<!-- Confirmation Modal -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h3>⚠️ Delete Column?</h3>
        <p>Are you sure you want to remove this column?</p>
        <div style="display:flex; gap:12px; margin-top:20px;">
            <button class="m-btn" style="background:#f1f5f9" onclick="closeConfirm()">Cancel</button>
            <button class="m-btn" style="background:var(--danger); color:white" onclick="executeDelete()">Delete</button>
        </div>
    </div>
</div>

<!-- Filter Menu -->
<div class="filter-menu" id="filterMenu">
    <div class="filter-option" onclick="sortTable('num-desc')">🔢 Large to Small</div>
    <div class="filter-option" onclick="sortTable('num-asc')">🔢 Small to Large</div>
    <div class="filter-option" onclick="sortTable('alpha')">🔤 A to Z Serial</div>
    <div class="filter-option" onclick="sortTable('reset')">🔄 Normal View</div>
</div>

<!-- Image Popup -->
<div class="popup-overlay" id="imagePopup" onclick="closePopup()">
    <div class="popup-card" onclick="event.stopPropagation()">
        <div class="popup-img-container"><img id="largeImage" src=""></div>
        <div class="popup-info" id="popupInfo"></div>
    </div>
</div>

<div class="app-container" id="app">
    <div class="header">
        <div class="brand">FilenameToExcel</div>
        <div class="session-box"><input type="text" id="excelName" placeholder="Project Name..." oninput="autoSave()"></div>
    </div>

    <div class="toolbar">
        <label class="btn" style="background: #4f46e5;">📂 Folder <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none"></label>
        <label class="btn" style="background: #9333ea;">📄 Files <input type="file" id="fileInput" multiple style="display:none"></label>
        <button class="btn" id="togglePhotoBtn" style="background:#0ea5e9" onclick="togglePhotoMode()">🖼️ Show Photos</button>
        <button class="btn" style="background:#334155" onclick="addNewColumn()">+ Add Column</button>
        <input type="text" id="searchBox" class="search-input" onkeyup="searchData()" placeholder="Filter through your data...">
        <button class="btn" style="background:#22c55e" onclick="exportToExcel()">📊 Export XLSX</button>
        <button class="btn" style="background:#ef4444" onclick="clearTable()">🗑️ Clear</button>
    </div>

    <div id="auditPanel" style="display:none;">
        <div class="symbol-tags">
            <span class="tag-label">Separators Detected:</span>
            <div id="symbolList" style="display:flex; gap:8px;"></div>
        </div>
    </div>

    <div class="table-area">
        <table id="dataTable">
            <thead id="tableHead">
                <tr id="tableHeader">
                    <th style="width:60px;">#</th>
                    <th><div class="th-content">FIELD 1</div></th>
                    <th style="width:250px;">PREVIEW</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="history-list" id="historyList"></div>
</div>

<script>
    let activeId = null;
    let selectedSeps = ['_'];
    let showPhotos = false;
    let fileMemory = {}; 
    let currentSortCol = null;
    let colToDelete = null;

    const tableBody = document.getElementById('tableBody');
    const tableHeader = document.getElementById('tableHeader');
    const excelNameInput = document.getElementById('excelName');

    // Folder & File Upload
    document.getElementById('folderInput').addEventListener('change', e => {
        if(e.target.files.length) handleUpload(e.target.files, e.target.files[0].webkitRelativePath.split('/')[0]);
    });
    document.getElementById('fileInput').addEventListener('change', e => {
        if(e.target.files.length) handleUpload(e.target.files, excelNameInput.value || "New_Project");
    });

    // Drag and Drop Bypasses the directory popup in most modern contexts
    window.addEventListener('dragenter', e => { e.preventDefault(); document.getElementById('dropZone').style.display='flex'; });
    document.getElementById('dropZone').addEventListener('dragleave', () => document.getElementById('dropZone').style.display='none');
    window.addEventListener('dragover', e => e.preventDefault());
    window.addEventListener('drop', e => {
        e.preventDefault();
        document.getElementById('dropZone').style.display='none';
        handleUpload(e.dataTransfer.files, "Dropped_Data");
    });

    function handleUpload(files, sName) {
        Array.from(files).forEach(file => { if(file.type.startsWith('image/')) fileMemory[file.name] = URL.createObjectURL(file); });
        processData(files, sName);
    }

    function processData(files, sName) {
        const newId = Date.now();
        const entries = Array.from(files).map((f, i) => ({
            n: f.name.replace(/\.[^/.]+$/, ""),
            e: f.name.includes('.') ? f.name.split('.').pop() : "",
            full: f.name,
            origIdx: i
        }));

        let syms = new Set(['_', '-', ' ']);
        entries.forEach(f => {
            const m = f.n.match(/[^a-zA-Z0-9\s_]/g);
            if(m) m.forEach(s => syms.add(s));
        });

        const session = {
            id: newId, name: sName, 
            color: `hsl(${Math.floor(Math.random() * 360)}, 75%, 45%)`,
            headers: ["ROLL NO", "STUDENT NAME", "FATHER NAME", "VILLAGE"],
            files: entries, seps: ['_'], allDetected: Array.from(syms), 
            date: new Date().toLocaleDateString()
        };

        let db = JSON.parse(localStorage.getItem('liquid_ultra_db') || "[]");
        db.unshift(session);
        localStorage.setItem('liquid_ultra_db', JSON.stringify(db));
        loadSession(newId);
    }

    function loadSession(id) {
        const db = JSON.parse(localStorage.getItem('liquid_ultra_db') || "[]");
        const s = db.find(item => item.id === id);
        if(!s) return;

        activeId = id; selectedSeps = s.seps || ['_'];
        excelNameInput.value = s.name;
        document.documentElement.style.setProperty('--theme-color', s.color);

        const escaped = selectedSeps.map(sep => sep.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
        const splitRegex = new RegExp(escaped, 'g');

        let maxParts = 1;
        s.files.forEach(f => {
            const count = f.n.split(splitRegex).length;
            if(count > maxParts) maxParts = count;
        });

        // Headers
        let hHtml = `<th style="width:70px;"><div class="th-content"># <i class="filter-trigger" onclick="openFilter(event, 0)">⋮</i></div></th>`;
        if(showPhotos) hHtml += `<th><div class="th-content">PHOTO</div></th>`;
        for(let i=0; i<maxParts; i++) {
            let title = s.headers[i] || `FIELD ${i+1}`;
            let colIdx = i + (showPhotos ? 2 : 1);
            hHtml += `<th>
                <div class="th-content">
                    <span contenteditable="true" oninput="autoSave()">${title}</span>
                    <div class="th-actions">
                        <i class="filter-trigger" onclick="openFilter(event, ${colIdx})">⋮</i>
                        <button class="col-del" onclick="requestDelete(this)">×</button>
                    </div>
                </div>
            </th>`;
        }
        hHtml += `<th style="width:280px;">RENAME PREVIEW</th>`;
        tableHeader.innerHTML = hHtml;

        // Rows
        tableBody.innerHTML = "";
        s.files.forEach((f, idx) => {
            const parts = f.n.split(splitRegex);
            const tr = document.createElement('tr');
            tr.dataset.origIdx = f.origIdx;
            let rowHtml = `<td style="color:#94a3b8; font-weight:800; text-align:center;">${idx+1}</td>`;
            if(showPhotos) {
                const imgSrc = fileMemory[f.full] || 'https://via.placeholder.com/50?text=No+Img';
                rowHtml += `<td><img src="${imgSrc}" class="img-thumb" onclick="openPopup(this)"></td>`;
            }
            for(let i=0; i<maxParts; i++) rowHtml += `<td>${parts[i] || ""}</td>`;
            const preview = parts.filter(p => p.trim() !== "").join(selectedSeps[0] || "_") + (f.e ? "." + f.e : "");
            rowHtml += `<td class="preview-col">${preview}</td>`;
            tr.innerHTML = rowHtml;
            tableBody.appendChild(tr);
        });

        // Audit Panel (Separators)
        document.getElementById('auditPanel').style.display = 'block';
        document.getElementById('symbolList').innerHTML = s.allDetected.map(sym => `
            <span class="sep-chip ${selectedSeps.includes(sym) ? 'active' : ''}" 
                  onclick="toggleSep('${sym}')">${sym === ' ' ? 'Space' : sym}</span>
        `).join('');

        renderHistory();
    }

    function toggleSep(sym) {
        let db = JSON.parse(localStorage.getItem('liquid_ultra_db') || "[]");
        const idx = db.findIndex(s => s.id === activeId);
        if(idx !== -1) {
            let list = db[idx].seps || [];
            list.includes(sym) ? list = list.filter(s => s !== sym) : list.push(sym);
            db[idx].seps = list;
            localStorage.setItem('liquid_ultra_db', JSON.stringify(db));
            loadSession(activeId);
        }
    }

    function openFilter(e, colIndex) {
        e.stopPropagation();
        currentSortCol = colIndex;
        const menu = document.getElementById('filterMenu');
        menu.style.display = 'flex';
        menu.style.top = (e.clientY + 10) + 'px';
        menu.style.left = (e.clientX - 160) + 'px';
    }

    function sortTable(type) {
        const rows = Array.from(tableBody.querySelectorAll('tr'));
        rows.sort((a, b) => {
            if (type === 'reset') return a.dataset.origIdx - b.dataset.origIdx;
            let valA = a.cells[currentSortCol].innerText.trim();
            let valB = b.cells[currentSortCol].innerText.trim();
            if (type === 'num-asc' || type === 'num-desc') {
                let nA = parseFloat(valA.replace(/[^0-9.]/g, '')) || 0;
                let nB = parseFloat(valB.replace(/[^0-9.]/g, '')) || 0;
                return type === 'num-asc' ? nA - nB : nB - nA;
            }
            return valA.localeCompare(valB, undefined, {numeric: true});
        });
        tableBody.innerHTML = "";
        rows.forEach((r, i) => { r.cells[0].innerText = i + 1; tableBody.appendChild(r); });
        closeAllMenus();
    }

    function requestDelete(btn) { colToDelete = btn; document.getElementById('confirmModal').style.display = 'flex'; }
    function closeConfirm() { document.getElementById('confirmModal').style.display = 'none'; colToDelete = null; }
    function executeDelete() {
        if(colToDelete) {
            const cell = colToDelete.closest('th');
            const idx = cell.cellIndex;
            cell.remove();
            Array.from(tableBody.querySelectorAll('tr')).forEach(tr => tr.deleteCell(idx));
            autoSave();
            closeConfirm();
        }
    }

    function openPopup(imgElement) {
        const popup = document.getElementById('imagePopup');
        const largeImg = document.getElementById('largeImage');
        largeImg.src = imgElement.src;
        const targetRow = imgElement.closest('tr');
        const headerCells = Array.from(tableHeader.cells);
        const rowCells = Array.from(targetRow.cells);
        let infoHtml = `<h3>File Details</h3>`;
        headerCells.forEach((th, index) => {
            const headerText = th.querySelector('span') ? th.querySelector('span').innerText : th.innerText.replace('⋮', '').trim();
            if(headerText && !["#", "PHOTO", "RENAME PREVIEW"].includes(headerText)) {
                infoHtml += `<div class="info-row"><span class="info-label">${headerText}</span><span class="info-val">${rowCells[index].innerText || '---'}</span></div>`;
            }
        });
        document.getElementById('popupInfo').innerHTML = infoHtml;
        popup.style.display = 'flex';
    }

    function closePopup() { document.getElementById('imagePopup').style.display = 'none'; }
    function closeAllMenus() { document.getElementById('filterMenu').style.display = 'none'; }
    function togglePhotoMode() { showPhotos = !showPhotos; if(activeId) loadSession(activeId); }
    function clearTable() { tableBody.innerHTML = ""; activeId = null; document.getElementById('auditPanel').style.display='none'; fileMemory={};}
    function searchData() {
        const q = document.getElementById('searchBox').value.toLowerCase();
        Array.from(tableBody.querySelectorAll('tr')).forEach(tr => tr.style.display = tr.innerText.toLowerCase().includes(q) ? "" : "none");
    }

    function addNewColumn() {
        if(!activeId) return;
        const th = document.createElement('th');
        th.innerHTML = `<div class="th-content"><span contenteditable="true">NEW FIELD</span><div class="th-actions"><i class="filter-trigger" onclick="openFilter(event, ${tableHeader.cells.length - 1})">⋮</i><button class="col-del" onclick="requestDelete(this)">×</button></div></div>`;
        tableHeader.insertBefore(th, tableHeader.lastElementChild);
        Array.from(tableBody.querySelectorAll('tr')).forEach(tr => tr.insertBefore(document.createElement('td'), tr.lastElementChild));
        autoSave();
    }

    function exportToExcel() {
        if(!activeId) return;
        const clone = document.getElementById("dataTable").cloneNode(true);
        clone.querySelectorAll('button, .filter-trigger, .img-thumb').forEach(el => el.remove());
        XLSX.writeFile(XLSX.utils.table_to_book(clone), `${excelNameInput.value}.xlsx`);
    }

    function autoSave() {
        if(!activeId) return;
        let db = JSON.parse(localStorage.getItem('liquid_ultra_db') || "[]");
        const idx = db.findIndex(s => s.id === activeId);
        if(idx !== -1) {
            db[idx].name = excelNameInput.value;
            db[idx].headers = Array.from(tableHeader.querySelectorAll('.th-content span')).map(s => s.innerText);
            localStorage.setItem('liquid_ultra_db', JSON.stringify(db));
        }
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        const db = JSON.parse(localStorage.getItem('liquid_ultra_db') || "[]");
        list.innerHTML = db.map(s => `
            <div class="history-item" style="background:${s.color}" onclick="loadSession(${s.id})">
                <span style="position:absolute; top:10px; right:15px; font-size:20px; color:white;" onclick="removeHistory(event, ${s.id})">×</span>
                <b>${s.name}</b>
                <small>📅 ${s.date}<br>📂 ${s.files.length} Files</small>
            </div>
        `).join('');
    }

    function removeHistory(e, id) {
        e.stopPropagation();
        const db = JSON.parse(localStorage.getItem('liquid_ultra_db') || "[]").filter(s => s.id !== id);
        localStorage.setItem('liquid_ultra_db', JSON.stringify(db));
        location.reload();
    }

    window.onload = renderHistory;
</script>
</body>
</html>
